name: keep-render-awake

# Tiene sveglio il servizio Render (piano free) che altrimenti va in standby
# dopo ~15 min di inattivita', fermando il loop del bot. Gira nel cloud di
# GitHub: nessun PC acceso necessario. Pinga /api/status (che avvia anche il bot).

on:
  schedule:
    - cron: '*/10 * * * *'   # ogni 10 minuti
  workflow_dispatch:          # avvio manuale dalla tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render keep-alive
        run: |
          echo "Ping $(date -u)"
          curl -sS -m 30 https://cryptobot-4k3g.onrender.com/api/status > /dev/null || true
