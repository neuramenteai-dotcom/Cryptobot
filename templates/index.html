<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        header {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 1rem;
        }

        h1 {
            font-weight: 800;
            margin: 0;
            font-size: 24px;
            background: -webkit-linear-gradient(#60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
            animation: pulse 2s infinite;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: transform 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-2px);
        }

        .metric-title {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 800;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
        }

        .log-container {
            background: #020617;
            border-radius: 12px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            color: #a5b4fc;
            border: 1px solid var(--glass-border);
        }

        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        
        button:hover { opacity: 0.8; transform: scale(1.02); }

    </style>
</head>
<body>

    <header>
        <h1>⚡ CryptoBot AI Dashboard</h1>
        <div class="controls">
            <button class="btn-start" onclick="fetch('/api/start')">▶ Avvia Bot</button>
            <button class="btn-stop" onclick="fetch('/api/stop')">■ Ferma Bot</button>
            <div id="statusIndicator" class="status-badge">ONLINE</div>
        </div>
    </header>

    <div class="container">
        
        <div class="main-content">
            <div class="glass-panel">
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-title">Budget Operativo</div>
                        <div class="metric-value" id="balance">€0.00</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Profitto Netto</div>
                        <div class="metric-value" id="profit">€0.00</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Operazioni (Vinte/Perse)</div>
                        <div class="metric-value" id="winrate">0 / 0</div>
                    </div>
                </div>
            </div>

            <div class="glass-panel">
                <h3 style="margin-top:0; color:var(--text-muted)">Posizioni Aperte</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Asset</th>
                                <th>Investito</th>
                                <th>Ingresso</th>
                                <th>Prezzo Attuale</th>
                                <th>Variazione</th>
                            </tr>
                        </thead>
                        <tbody id="positionsTable">
                            <tr><td colspan="5" style="text-align:center; color:gray">Nessuna posizione aperta al momento.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass-panel" style="padding:15px">
                <h3 style="margin-top:0; font-size:14px; color:var(--text-muted)">Terminal Log</h3>
                <div class="log-container" id="terminalLog">
                    <div class="log-line">In attesa di dati...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Aggiorna Status
                const statusBadge = document.getElementById('statusIndicator');
                if(data.running) {
                    statusBadge.innerText = "● IN ESECUZIONE";
                    statusBadge.style.borderColor = "var(--success)";
                    statusBadge.style.color = "var(--success)";
                    statusBadge.style.animation = "pulse 2s infinite";
                } else {
                    statusBadge.innerText = "○ FERMO";
                    statusBadge.style.borderColor = "var(--text-muted)";
                    statusBadge.style.color = "var(--text-muted)";
                    statusBadge.style.animation = "none";
                }

                // Aggiorna Metriche
                document.getElementById('balance').innerText = `€${data.balance.toFixed(2)}`;
                
                const profitEl = document.getElementById('profit');
                profitEl.innerText = `€${data.total_profit.toFixed(2)}`;
                profitEl.className = 'metric-value ' + (data.total_profit >= 0 ? 'text-green' : 'text-red');

                document.getElementById('winrate').innerText = `${data.win_rate.wins} / ${data.win_rate.losses}`;

                // Aggiorna Posizioni Aperte
                const posTable = document.getElementById('positionsTable');
                if (Object.keys(data.open_positions).length === 0) {
                    posTable.innerHTML = '<tr><td colspan="5" style="text-align:center; color:gray">Nessuna posizione aperta al momento.</td></tr>';
                } else {
                    posTable.innerHTML = '';
                    for (const [sym, pos] of Object.entries(data.open_positions)) {
                        const pnl_pct = pos.pnl_pct * 100;
                        const colorClass = pnl_pct >= 0 ? 'text-green' : 'text-red';
                        const sign = pnl_pct >= 0 ? '+' : '';
                        
                        posTable.innerHTML += `
                            <tr>
                                <td style="font-weight:600">${sym}</td>
                                <td>€${pos.amount_eur.toFixed(2)}</td>
                                <td>$${pos.entry_price.toFixed(4)}</td>
                                <td>$${pos.current_price.toFixed(4)}</td>
                                <td class="${colorClass}">${sign}${pnl_pct.toFixed(2)}%</td>
                            </tr>
                        `;
                    }
                }

                // Aggiorna Logs
                const logContainer = document.getElementById('terminalLog');
                logContainer.innerHTML = '';
                data.logs.forEach(line => {
                    let color = "";
                    if(line.includes("TAKE PROFIT") || line.includes("SEGNALE")) color = "text-green";
                    if(line.includes("STOP LOSS") || line.includes("Errore")) color = "text-red";
                    logContainer.innerHTML += `<div class="log-line ${color}">${line}</div>`;
                });

            } catch (e) {
                console.error("Errore fetch dashboard:", e);
            }
        }

        // Aggiorna ogni 2 secondi
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
